version: "3.9"

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: todo_app
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_PORT: 5432
      FLASK_DEBUG: "True"
      PORT: 5000
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: todo_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
