name: your_app_name
description: A new Flutter project

version: 1.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
    
    version: "3.9"

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: todo_app
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_PORT: 5432
      FLASK_DEBUG: "True"
      PORT: 5000
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: todo_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
