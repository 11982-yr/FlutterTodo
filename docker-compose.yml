version: '3.8'

services:
  db:
    image: postgres:15
    container_name: todo_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: todo_app
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: todo_backend
    depends_on:
      - db
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: todo_app
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_PORT: 5432